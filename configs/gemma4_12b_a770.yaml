experiment_name: msa-zria-gemma4-12b-a770
seed: 42

model:
  base_model_id: google/gemma-4-12B
  processor_id: google/gemma-4-12B-it
  load_in_4bit: true
  use_double_quant: true
  quant_type: nf4
  prepare_for_kbit_training: true

training:
  output_dir: outputs/gemma4_12b_a770
  accelerator: xpu
  learning_rate: 2.0e-4
  num_train_epochs: 3
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16
  max_length: 1024
  logging_steps: 10
  save_strategy: epoch
  eval_strategy: epoch
  lora_r: 16
  lora_alpha: 16
  lora_dropout: 0.05
  gradient_checkpointing: true
